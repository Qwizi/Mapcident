name: Release and Publish GHCR

on:
  push:
    branches:
      - main
      - master
    paths:
      - apps/**
      - config/**
      - frontend/**
      - Dockerfile
      - frontend/Dockerfile
      - pyproject.toml
      - uv.lock
      - main.py
      - manage.py
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Set CalVer, create release, and publish images
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Compute and set CalVer in pyproject.toml
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          OLD_VERSION="$(uv version --short)"
          YEAR="$(date -u +%Y)"
          MONTH="$((10#$(date -u +%m)))"
          DAY="$((10#$(date -u +%d)))"
          CALVER_PREFIX="${YEAR}.${MONTH}.${DAY}"

          NEXT_BUILD=1
          while read -r TAG_LINE; do
            BUILD="${TAG_LINE#v${CALVER_PREFIX}.}"
            if [[ "${BUILD}" =~ ^[0-9]+$ ]] && (( BUILD >= NEXT_BUILD )); then
              NEXT_BUILD=$((BUILD + 1))
            fi
          done < <(git tag --list "v${CALVER_PREFIX}.*")

          NEW_VERSION="${CALVER_PREFIX}.${NEXT_BUILD}"
          uv version "${NEW_VERSION}" --frozen

          TAG="v${NEW_VERSION}"

          echo "old_version=${OLD_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "version=${NEW_VERSION}"     >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}"                 >> "${GITHUB_OUTPUT}"

      - name: Commit version bump and push
        shell: bash
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pyproject.toml
          if git diff --cached --quiet; then
            echo "No version changes detected"
          else
            git commit -m "release: bump version to ${{ steps.version.outputs.tag }} [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists"
          else
            git tag "${{ steps.version.outputs.tag }}"
            git push origin "${{ steps.version.outputs.tag }}"
          fi

      - name: Resolve image names
        id: vars
        shell: bash
        run: |
          REPO="${GITHUB_REPOSITORY,,}"
          echo "backend_image=ghcr.io/${REPO}"            >> "${GITHUB_OUTPUT}"
          echo "frontend_image=ghcr.io/${REPO}-frontend"  >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend image ──────────────────────────────────────────────

      - name: Extract Docker metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.backend_image }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.tag }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      # ── Frontend image ─────────────────────────────────────────────

      - name: Extract Docker metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.frontend_image }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.tag }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_MEDIA_URL=
